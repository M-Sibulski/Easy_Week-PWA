#############################################
#  Netlify routing rules for a Vite PWA SPA #
#############################################

[build]
  command = "npm run build:prod"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22.22.2"
  NPM_FLAGS = "--prefer-online --fetch-retries=5 --fetch-retry-mintimeout=20000 --fetch-retry-maxtimeout=120000"

# Serve the real service‑worker script, not index.html
[[redirects]]
  from   = "/sw.js"
  to     = "/sw.js"
  status = 200

# Serve the Web App Manifest
[[redirects]]
  from   = "/manifest.webmanifest"
  to     = "/manifest.webmanifest"
  status = 200

# (Optional) favicon, analytics, any other root files you need
[[redirects]]
  from   = "/favicon.ico"
  to     = "/favicon.ico"
  status = 200

# Catch‑all: send every other unknown path to your SPA entry
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200
